name: Run Tests, Lint, and Type Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck, Lint, and Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Run linter
        run: bun eslint . --cache

      - name: Type check
        run: bun tsc --noEmit

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .eslintcache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

  test-alpine:
    name: Typecheck, Lint, and Tests (Alpine)
    runs-on: ubuntu-latest
    container:
      image: oven/bun:alpine
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        shell: sh
        run: bun install

      - name: Run tests
        shell: sh
        run: bun test

      - name: Run linter
        shell: sh
        run: bun eslint . --cache

      - name: Type check
        shell: sh
        run: bun tsc --noEmit
